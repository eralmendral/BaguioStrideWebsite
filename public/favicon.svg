<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="20" fill="#2E7D32"/>
  
  <!-- Route icon - stylized path with waypoints (matching HugeIcons route icon style) -->
  <g fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Curved route path -->
    <path d="M 20 60 Q 40 30, 50 40 Q 60 50, 80 40" />
    
    <!-- Start point -->
    <circle cx="20" cy="60" r="6" fill="white"/>
    
    <!-- Mid waypoint -->
    <circle cx="50" cy="40" r="6" fill="white"/>
    
    <!-- End point -->
    <circle cx="80" cy="40" r="6" fill="white"/>
  </g>
</svg>
